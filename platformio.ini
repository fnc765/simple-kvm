; simple-kvm PlatformIO configuration
; BluePill #1: USB CDC Serial receiver + UART1 forwarder
; BluePill #2: UART1 receiver + USB HID Composite (Keyboard+Mouse)

[platformio]
default_envs = bluepill1, bluepill2
; ソースルートを firmware/ に設定し、各環境で build_src_filter を使って
; 対象サブディレクトリのみをコンパイル対象にする
src_dir = firmware

[env:bluepill1]
platform = ststm32
board = bluepill_f103c8
framework = arduino
; firmware/bluepill1/ 以下のみビルド (.ino は Arduino IDE 用なので除外)
build_src_filter = +<bluepill1/*> -<bluepill1/*.ino>

; USB CDC Serial 有効化
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBD_USE_CDC
    -D USBD_CDC_ENABLE_SUSPEND_RESUME=0

; IWatchdog は STM32duino 組み込み (追加 lib_deps 不要)
lib_deps =

upload_protocol = stlink

[env:bluepill2]
platform = ststm32
board = bluepill_f103c8
framework = arduino
; firmware/bluepill2/ 以下のみビルド (.ino は Arduino IDE 用なので除外)
build_src_filter = +<bluepill2/*> -<bluepill2/*.ino>

; STM32duino 内蔵 USB HID Composite を有効化
; (arpruss/USBComposite_stm32f1 は旧libmaple向けのため使用不可)
build_flags =
    -D USBCON
    -D USBD_USE_HID_COMPOSITE

; lib_deps は不要 (内蔵フレームワークの USBDevice を使用)
lib_deps =

upload_protocol = stlink
