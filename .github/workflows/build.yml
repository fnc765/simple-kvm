name: Build Windows Installer

on:
  push:
    tags: ['v*']
    branches: ['main']
    paths:
      - 'app/**'
      - 'simple-kvm.spec'
      - 'installer.iss'
      - 'installer_resources/**'
      - 'pyproject.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install "pyinstaller>=6.0,<7.0.0" "pyinstaller-hooks-contrib>=2024.0,<2027.0"

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller --clean simple-kvm.spec

      - name: Copy PySide6 plugins (post-build fallback)
        shell: pwsh
        run: |
          $destPlugins = "dist/simple-kvm/_internal/PySide6/plugins"
          if (Test-Path "$destPlugins/platforms/qwindows.dll") {
            Write-Host "Plugins already bundled by PyInstaller hooks"
          } else {
            Write-Host "Plugins NOT bundled -- copying manually..."
            $pipInfo = pip show PySide6 2>&1 | Out-String
            $location = ($pipInfo | Select-String "Location:").ToString().Trim() -replace "Location:\s*", ""
            Write-Host "PySide6 Location from pip: $location"
            # Search for plugins in all PySide6* directories
            $found = $false
            foreach ($dir in @("$location\PySide6\plugins", "$location\PySide6_Essentials\plugins")) {
              if (Test-Path "$dir\platforms\qwindows.dll") {
                Write-Host "Found plugins at: $dir"
                New-Item -ItemType Directory -Force -Path $destPlugins | Out-Null
                Copy-Item -Recurse "$dir\*" $destPlugins -Force
                $found = $true
                break
              }
            }
            if (-not $found) {
              throw "Cannot find PySide6 plugins directory under $location"
            }
          }

      - name: Copy av.libs FFmpeg DLLs (post-build fallback)
        shell: pwsh
        run: |
          $destAvlibs = "dist/simple-kvm/_internal/av.libs"
          if (Test-Path "$destAvlibs/avcodec-*.dll") {
            Write-Host "av.libs already bundled by PyInstaller hooks"
          } else {
            Write-Host "av.libs NOT bundled -- copying manually..."
            $pipInfo = pip show av 2>&1 | Out-String
            $location = ($pipInfo | Select-String "Location:").ToString().Trim() -replace "Location:\s*", ""
            Write-Host "av Location from pip: $location"
            $src = "$location\av.libs"
            if (Test-Path $src) {
              New-Item -ItemType Directory -Force -Path $destAvlibs | Out-Null
              Copy-Item -Recurse "$src\*" $destAvlibs -Force
              Write-Host "Copied av.libs successfully"
            } else {
              throw "av.libs not found at $src"
            }
          }

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/simple-kvm/simple-kvm.exe")) {
            throw "EXE not found!"
          }
          $pluginDlls = @(Get-ChildItem "dist/simple-kvm/_internal/PySide6/plugins/platforms/qwindows.dll" -ErrorAction SilentlyContinue)
          if ($pluginDlls.Count -eq 0) {
            throw "Qt platform plugin (qwindows.dll) still missing after manual copy!"
          }
          Write-Host "qwindows.dll: $($pluginDlls[0].FullName)"
          $ffmpegDlls = @(Get-ChildItem "dist/simple-kvm/_internal/av.libs/avcodec-*.dll" -ErrorAction SilentlyContinue)
          if ($ffmpegDlls.Count -eq 0) {
            throw "FFmpeg DLLs still missing after manual copy!"
          }
          Write-Host "FFmpeg DLLs: $($ffmpegDlls.Count) files"
          $size = [math]::Round(((Get-ChildItem -Recurse -File dist/simple-kvm/ | Measure-Object -Property Length -Sum).Sum)/1MB, 1)
          Write-Host "Total size: $size MB"

      - name: Install Inno Setup
        run: choco install innosetup --version=6.4.1 -y --no-progress

      - name: Verify license file
        run: |
          if (-not (Test-Path "installer_resources/license.txt")) {
            throw "License file not found!"
          }

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $innoDir = "${env:ProgramFiles(x86)}\Inno Setup 6"
          if (-not (Test-Path "$innoDir\ISCC.exe")) {
            throw "Inno Setup ISCC.exe not found at: $innoDir"
          }
          & "$innoDir\ISCC.exe" installer.iss

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem Output/simple-kvm-*-setup.exe | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash
          "$hash  $($installer.Name)" | Out-File -FilePath "Output/simple-kvm-sha256.txt" -Encoding utf8
          Write-Host "SHA256: $hash"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-kvm-installer
          path: |
            Output/simple-kvm-*-setup.exe
            Output/simple-kvm-sha256.txt
          if-no-files-found: error

      - name: Upload build output artifact (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          retention-days: 7
          path: |
            build/simple-kvm/warn-simple-kvm.txt
