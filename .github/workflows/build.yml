name: Build Windows Installer

on:
  push:
    tags: ['v*']
    branches: ['main']
    paths:
      - 'app/**'
      - 'simple-kvm.spec'
      - 'installer.iss'
      - 'installer_resources/**'
      - 'pyproject.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "=== Upgrading pip ==="
          python -m pip install --upgrade pip
          Write-Host "=== Installing app requirements ==="
          pip install -r app/requirements.txt
          Write-Host "=== Installing build tools ==="
          pip install "pyinstaller>=6.0,<7.0.0" "pyinstaller-hooks-contrib>=2024.0,<2027.0"
          Write-Host "=== Verifying ==="
          python -c "import PySide6; print('PySide6', PySide6.__version__)"
          python -c "import PySide6.QtCore; print('QtCore OK')"
          python -c "import av; print('av', av.__version__)"
          python -c "import pyserial; print('pyserial', pyserial.__version__)"

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller --clean simple-kvm.spec

      - name: Copy PySide6 plugins (post-build fallback)
        shell: pwsh
        run: |
          $dest = "dist/simple-kvm/_internal/PySide6/plugins"
          if (Test-Path "$dest/platforms/qwindows.dll") {
            Write-Host "Plugins already bundled by PyInstaller hooks"
          } else {
            Write-Host "Plugins NOT bundled -- searching via pythonLocation..."
            $base = "$env:pythonLocation\Lib\site-packages"
            Write-Host "Site-packages: $base"
            $found = $false
            foreach ($dir in @("$base\PySide6\plugins", "$base\PySide6_Essentials\plugins")) {
              if (Test-Path "$dir\platforms\qwindows.dll") {
                Write-Host "Found: $dir"
                New-Item -ItemType Directory -Force -Path $dest | Out-Null
                Copy-Item -Recurse "$dir\*" $dest -Force
                $found = $true
                break
              }
            }
            if (-not $found) {
              Write-Host "Trying glob..."
              $candidates = @(Get-ChildItem -Path "$base\PySide6*\plugins\platforms\qwindows.dll" -Recurse -ErrorAction SilentlyContinue)
              if ($candidates.Count -gt 0) {
                $src = $candidates[0].Directory.Parent.FullName
                Write-Host "Found via glob: $src"
                New-Item -ItemType Directory -Force -Path $dest | Out-Null
                Copy-Item -Recurse "$src\*" $dest -Force
                $found = $true
              }
            }
            if (-not $found) {
              Get-ChildItem "$base" -Directory -Filter "PySide6*" | ForEach-Object { Write-Host "PySide6 dir: $($_.FullName)" }
              throw "Cannot find PySide6 plugins anywhere under $base"
            }
          }

      - name: Copy av.libs FFmpeg DLLs (post-build fallback)
        shell: pwsh
        run: |
          $dest = "dist/simple-kvm/_internal/av.libs"
          if (Test-Path "$dest/avcodec-*.dll") {
            Write-Host "av.libs already bundled"
          } else {
            Write-Host "av.libs NOT bundled -- searching via pythonLocation..."
            $src = "$env:pythonLocation\Lib\site-packages\av.libs"
            if (Test-Path $src) {
              New-Item -ItemType Directory -Force -Path $dest | Out-Null
              Copy-Item -Recurse "$src\*" $dest -Force
              Write-Host "Copied from: $src"
            } else {
              throw "av.libs not found at $src"
            }
          }

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/simple-kvm/simple-kvm.exe")) {
            throw "EXE not found!"
          }
          $pluginDlls = @(Get-ChildItem "dist/simple-kvm/_internal/PySide6/plugins/platforms/qwindows.dll" -ErrorAction SilentlyContinue)
          if ($pluginDlls.Count -eq 0) {
            throw "Qt platform plugin (qwindows.dll) still missing after manual copy!"
          }
          Write-Host "qwindows.dll: $($pluginDlls[0].FullName)"
          $ffmpegDlls = @(Get-ChildItem "dist/simple-kvm/_internal/av.libs/avcodec-*.dll" -ErrorAction SilentlyContinue)
          if ($ffmpegDlls.Count -eq 0) {
            throw "FFmpeg DLLs still missing after manual copy!"
          }
          Write-Host "FFmpeg DLLs: $($ffmpegDlls.Count) files"
          $size = [math]::Round(((Get-ChildItem -Recurse -File dist/simple-kvm/ | Measure-Object -Property Length -Sum).Sum)/1MB, 1)
          Write-Host "Total size: $size MB"

      - name: Install Inno Setup
        run: choco install innosetup --version=6.4.1 -y --no-progress

      - name: Verify license file
        run: |
          if (-not (Test-Path "installer_resources/license.txt")) {
            throw "License file not found!"
          }

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $innoDir = "${env:ProgramFiles(x86)}\Inno Setup 6"
          if (-not (Test-Path "$innoDir\ISCC.exe")) {
            throw "Inno Setup ISCC.exe not found at: $innoDir"
          }
          & "$innoDir\ISCC.exe" installer.iss

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem Output/simple-kvm-*-setup.exe | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash
          "$hash  $($installer.Name)" | Out-File -FilePath "Output/simple-kvm-sha256.txt" -Encoding utf8
          Write-Host "SHA256: $hash"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-kvm-installer
          path: |
            Output/simple-kvm-*-setup.exe
            Output/simple-kvm-sha256.txt
          if-no-files-found: error

      - name: Upload build output artifact (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          retention-days: 7
          path: |
            build/simple-kvm/warn-simple-kvm.txt
