name: Build Windows Installer

on:
  push:
    tags: ['v*']
    branches: ['main']
    paths:
      - 'app/**'
      - 'simple-kvm.spec'
      - 'installer.iss'
      - 'installer_resources/**'
      - 'pyproject.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            app/requirements.txt
            .github/workflows/build.yml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install "pyinstaller>=6.0,<7.0.0" "pyinstaller-hooks-contrib>=2024.0,<2027.0"

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --clean simple-kvm.spec

      - name: Verify build output
        run: |
          if (-not (Test-Path -Path "dist/simple-kvm/simple-kvm.exe" -PathType Leaf)) {
            throw "EXE not found!"
          }
          # Verify PySide6 Qt platform plugin (may be under PySide6/ or PySide6_Essentials/)
          $pluginDlls = @(Get-ChildItem -Path "dist/simple-kvm/_internal/PySide6*/plugins/platforms/qwindows.dll" -ErrorAction SilentlyContinue)
          if ($pluginDlls.Count -eq 0) {
            throw "Qt platform plugin (qwindows.dll) missing!"
          }
          Write-Host "Qt platform plugin found: $($pluginDlls[0].FullName)"
          # Verify FFmpeg DLLs
          $ffmpegDlls = @(Get-ChildItem -Path "dist/simple-kvm/_internal/av.libs/avcodec-*.dll" -ErrorAction SilentlyContinue)
          if ($ffmpegDlls.Count -eq 0) {
            throw "FFmpeg DLLs (avcodec-*.dll) missing!"
          }
          Write-Host "FFmpeg DLLs found: $($ffmpegDlls.Count) files"
          # Show full build contents
          Write-Host "=== Build output contents ==="
          Get-ChildItem -Recurse dist/simple-kvm/ | Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "=== EXE size: $((Get-Item dist/simple-kvm/simple-kvm.exe).Length) bytes ==="

      - name: Install Inno Setup
        run: choco install innosetup --version=6.4.1 -y --no-progress

      - name: Verify license file
        run: |
          if (-not (Test-Path -Path "installer_resources/license.txt" -PathType Leaf)) {
            throw "License file not found!"
          }

      - name: Build installer with Inno Setup
        run: |
          $innoDir = "${env:ProgramFiles(x86)}\Inno Setup 6"
          if (-not (Test-Path "$innoDir\ISCC.exe")) {
            throw "Inno Setup ISCC.exe not found at: $innoDir"
          }
          & "$innoDir\ISCC.exe" installer.iss

      - name: Generate SHA256 checksum
        run: |
          $installer = Get-ChildItem Output/simple-kvm-*-setup.exe | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash
          "$hash  $($installer.Name)" | Out-File -FilePath "Output/simple-kvm-sha256.txt" -Encoding utf8
          Write-Host "SHA256: $hash"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-kvm-installer
          path: |
            Output/simple-kvm-*-setup.exe
            Output/simple-kvm-sha256.txt
          if-no-files-found: error

      - name: Upload build output artifact (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          retention-days: 7
          path: |
            build/simple-kvm/warn-simple-kvm.txt
